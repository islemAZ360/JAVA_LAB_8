<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <!-- Cosmic gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#150734;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0221;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Glow filter for text -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Intense glow for accents -->
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Radial glow for orbs -->
    <radialGradient id="orbGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orbGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orbGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Animated gradient for title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc">
        <animate attributeName="stop-color" values="#c084fc;#22d3ee;#f472b6;#c084fc" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#f472b6;#c084fc;#22d3ee" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#f472b6">
        <animate attributeName="stop-color" values="#f472b6;#c084fc;#22d3ee;#f472b6" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Scan line gradient -->
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(15px,-20px); } }
    @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-20px,15px); } }
    @keyframes float3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(10px,18px); } }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes dash { to { stroke-dashoffset: 0; } }
    @keyframes scanAnim { 0% { transform: translateY(-320px); } 100% { transform: translateY(320px); } }
    @keyframes twinkle { 0%,100% { opacity: 0.2; r: 1; } 50% { opacity: 1; r: 2; } }
    @keyframes slideIn { 0% { opacity: 0; transform: translateX(-30px); } 100% { opacity: 1; transform: translateX(0); } }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes orbitSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes borderGlow { 0%,100% { stroke-opacity: 0.3; } 50% { stroke-opacity: 0.8; } }
    
    .star { animation: twinkle 3s ease-in-out infinite; }
    .orb1 { animation: float1 8s ease-in-out infinite; }
    .orb2 { animation: float2 10s ease-in-out infinite; }
    .orb3 { animation: float3 12s ease-in-out infinite; }
    .scan { animation: scanAnim 4s linear infinite; }
    .cursor-blink { animation: blink 1s step-end infinite; }
    .orbit-ring { animation: orbitSpin 20s linear infinite; transform-origin: 450px 160px; }
    .border-anim { animation: borderGlow 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="900" height="320" rx="16" fill="url(#bg)"/>
  
  <!-- Animated border -->
  <rect x="1" y="1" width="898" height="318" rx="16" fill="none" stroke="#7c3aed" stroke-width="1.5" class="border-anim"/>
  
  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="900" y2="280" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="320" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="320" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="320" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="320" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="#7c3aed" stroke-width="0.5"/>
  </g>
  
  <!-- Scan line overlay -->
  <rect x="0" y="0" width="900" height="80" fill="url(#scanLine)" class="scan">
    <animateTransform attributeName="transform" type="translate" from="0 -80" to="0 400" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Stars -->
  <circle cx="80" cy="40" r="1.2" fill="#fff" class="star" style="animation-delay:0s"/>
  <circle cx="180" cy="90" r="0.8" fill="#fff" class="star" style="animation-delay:0.5s"/>
  <circle cx="320" cy="30" r="1" fill="#c4b5fd" class="star" style="animation-delay:1s"/>
  <circle cx="500" cy="55" r="1.3" fill="#fff" class="star" style="animation-delay:1.5s"/>
  <circle cx="650" cy="35" r="0.9" fill="#a5f3fc" class="star" style="animation-delay:2s"/>
  <circle cx="780" cy="70" r="1.1" fill="#fff" class="star" style="animation-delay:0.3s"/>
  <circle cx="830" cy="25" r="0.7" fill="#fda4af" class="star" style="animation-delay:1.2s"/>
  <circle cx="120" cy="280" r="0.9" fill="#fff" class="star" style="animation-delay:0.8s"/>
  <circle cx="250" cy="290" r="1" fill="#c4b5fd" class="star" style="animation-delay:1.8s"/>
  <circle cx="700" cy="280" r="1.2" fill="#fff" class="star" style="animation-delay:2.2s"/>
  <circle cx="840" cy="290" r="0.8" fill="#a5f3fc" class="star" style="animation-delay:0.6s"/>
  <circle cx="420" cy="295" r="0.7" fill="#fff" class="star" style="animation-delay:1.4s"/>
  <circle cx="50" cy="160" r="0.6" fill="#fda4af" class="star" style="animation-delay:2.5s"/>
  <circle cx="860" cy="160" r="0.8" fill="#c4b5fd" class="star" style="animation-delay:1.1s"/>
  
  <!-- Floating orbs -->
  <circle cx="120" cy="100" r="80" fill="url(#orbGlow1)" class="orb1" opacity="0.4"/>
  <circle cx="750" cy="80" r="60" fill="url(#orbGlow2)" class="orb2" opacity="0.3"/>
  <circle cx="680" cy="260" r="50" fill="url(#orbGlow3)" class="orb3" opacity="0.25"/>
  
  <!-- Orbit ring -->
  <g class="orbit-ring" opacity="0.08">
    <ellipse cx="450" cy="160" rx="280" ry="100" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="8 12"/>
  </g>
  
  <!-- Decorative hexagon left -->
  <g transform="translate(60, 140)" opacity="0.12">
    <polygon points="25,0 50,14 50,42 25,56 0,42 0,14" fill="none" stroke="#22d3ee" stroke-width="1">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Decorative hexagon right -->
  <g transform="translate(800, 200)" opacity="0.12">
    <polygon points="20,0 40,11 40,33 20,44 0,33 0,11" fill="none" stroke="#f472b6" stroke-width="1">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="7s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Main title with animated gradient -->
  <text x="450" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" filter="url(#glow)" letter-spacing="2">
    JAVA LAB 8
  </text>
  
  <!-- Subtitle -->
  <text x="450" y="145" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="6" font-weight="300">
    ENTERPRISE CLIENT-SERVER APPLICATION
  </text>
  
  <!-- Animated typing line -->
  <g transform="translate(200, 185)">
    <rect x="0" y="-2" width="500" height="28" rx="6" fill="#1e1b4b" opacity="0.5" stroke="#312e81" stroke-width="0.5"/>
    <text x="14" y="16" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#22d3ee">
      <tspan fill="#a78bfa">$</tspan>
      <tspan fill="#94a3b8"> java</tspan>
      <tspan fill="#f472b6"> --module-path</tspan>
      <tspan fill="#94a3b8"> fx </tspan>
      <tspan fill="#22d3ee">Server.java</tspan>
      <tspan fill="#f472b6"> &amp;</tspan>
      <tspan fill="#22d3ee"> Client.java</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
    </text>
    <rect x="480" y="2" width="8" height="16" fill="#7c3aed" class="cursor-blink"/>
  </g>
  
  <!-- Tech stack icons row -->
  <g transform="translate(235, 235)">
    <!-- Java -->
    <g>
      <rect x="0" y="0" width="80" height="28" rx="14" fill="#1e1b4b" stroke="#7c3aed" stroke-width="0.7" opacity="0.8">
        <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="40" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c084fc" text-anchor="middle" font-weight="600">☕ Java 21</text>
    </g>
    <!-- JavaFX -->
    <g transform="translate(90, 0)">
      <rect x="0" y="0" width="76" height="28" rx="14" fill="#0c1e2e" stroke="#06b6d4" stroke-width="0.7" opacity="0.8">
        <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      <text x="38" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#22d3ee" text-anchor="middle" font-weight="600">🎨 JavaFX</text>
    </g>
    <!-- PostgreSQL -->
    <g transform="translate(176, 0)">
      <rect x="0" y="0" width="100" height="28" rx="14" fill="#0f1e2e" stroke="#3b82f6" stroke-width="0.7" opacity="0.8">
        <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/>
      </rect>
      <text x="50" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="600">🐘 PostgreSQL</text>
    </g>
    <!-- NIO -->
    <g transform="translate(286, 0)">
      <rect x="0" y="0" width="80" height="28" rx="14" fill="#1a1e0e" stroke="#84cc16" stroke-width="0.7" opacity="0.8">
        <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3.2s" repeatCount="indefinite"/>
      </rect>
      <text x="40" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a3e635" text-anchor="middle" font-weight="600">⚡ NIO</text>
    </g>
    <!-- Log4j2 -->
    <g transform="translate(376, 0)">
      <rect x="0" y="0" width="76" height="28" rx="14" fill="#1e0e0e" stroke="#f43f5e" stroke-width="0.7" opacity="0.8">
        <animate attributeName="stroke-opacity" values="0.3;0.9;0.3" dur="3.8s" repeatCount="indefinite"/>
      </rect>
      <text x="38" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb7185" text-anchor="middle" font-weight="600">📋 Log4j2</text>
    </g>
  </g>
  
  <!-- Bottom decorative line -->
  <line x1="200" y1="290" x2="700" y2="290" stroke="url(#titleGrad)" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Version tag -->
  <text x="450" y="308" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="3">
    ITMO UNIVERSITY • 2026 • v8.0
  </text>
</svg>
