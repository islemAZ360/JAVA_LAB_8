<svg xmlns="http://www.w3.org/2000/svg" width="900" height="350" viewBox="0 0 900 350">
  <defs>
    <!-- Deep cosmic background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030014"/>
      <stop offset="25%" style="stop-color:#0d0534"/>
      <stop offset="50%" style="stop-color:#070e27"/>
      <stop offset="75%" style="stop-color:#0d0534"/>
      <stop offset="100%" style="stop-color:#030014"/>
    </linearGradient>

    <!-- Nebula gradients -->
    <radialGradient id="nebula1" cx="20%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="80%" cy="30%" r="30%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="60%" cy="80%" r="25%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>

    <!-- Title gradient animated -->
    <linearGradient id="titleG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e9d5ff">
        <animate attributeName="stop-color" values="#e9d5ff;#a5f3fc;#fda4af;#e9d5ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="33%" style="stop-color:#a5f3fc">
        <animate attributeName="stop-color" values="#a5f3fc;#fda4af;#e9d5ff;#a5f3fc" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="66%" style="stop-color:#fda4af">
        <animate attributeName="stop-color" values="#fda4af;#e9d5ff;#a5f3fc;#fda4af" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#e9d5ff">
        <animate attributeName="stop-color" values="#e9d5ff;#a5f3fc;#fda4af;#e9d5ff" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#7c3aed;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.8"/>
      <stop offset="75%" style="stop-color:#ec4899;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>

    <!-- Badge pill gradients -->
    <linearGradient id="pillBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0f0a2e;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes twinkle { 0%,100% { opacity:0.1; r:0.8; } 50% { opacity:1; r:1.5; } }
    @keyframes twinkleSlow { 0%,100% { opacity:0.2; } 50% { opacity:0.8; } }
    @keyframes float1 { 0%,100% { transform:translate(0,0); } 50% { transform:translate(8px,-12px); } }
    @keyframes float2 { 0%,100% { transform:translate(0,0); } 50% { transform:translate(-10px,8px); } }
    @keyframes borderGlow { 0%,100% { stroke-opacity:0.15; } 50% { stroke-opacity:0.45; } }
    @keyframes cursorBlink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
    @keyframes lineShimmer {
      0% { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes orbitSpin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
    @keyframes ringPulse { 0%,100% { opacity:0.03; } 50% { opacity:0.08; } }
    @keyframes labelFade { 0% { opacity:0; } 100% { opacity:1; } }

    .star { animation: twinkle 3s ease-in-out infinite; }
    .starSlow { animation: twinkleSlow 5s ease-in-out infinite; }
    .fl1 { animation: float1 10s ease-in-out infinite; }
    .fl2 { animation: float2 12s ease-in-out infinite; }
    .bg-border { animation: borderGlow 4s ease-in-out infinite; }
    .cursor { animation: cursorBlink 1s step-end infinite; }
    .orbit { animation: orbitSpin 30s linear infinite; transform-origin: 450px 150px; }
    .ring-p { animation: ringPulse 5s ease-in-out infinite; }
    .line-sh { animation: lineShimmer 2s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="350" rx="18" fill="url(#bg)"/>

  <!-- Nebula layers -->
  <rect width="900" height="350" rx="18" fill="url(#nebula1)"/>
  <rect width="900" height="350" rx="18" fill="url(#nebula2)"/>
  <rect width="900" height="350" rx="18" fill="url(#nebula3)"/>

  <!-- Border -->
  <rect x="1" y="1" width="898" height="348" rx="18" fill="none" stroke="#7c3aed" stroke-width="1" class="bg-border"/>

  <!-- Orbit rings -->
  <g class="orbit" opacity="0.04">
    <ellipse cx="450" cy="150" rx="340" ry="120" fill="none" stroke="#c084fc" stroke-width="0.8" stroke-dasharray="6 10"/>
  </g>
  <g class="orbit" opacity="0.03" style="animation-duration:45s; animation-direction:reverse;">
    <ellipse cx="450" cy="150" rx="280" ry="90" fill="none" stroke="#22d3ee" stroke-width="0.6" stroke-dasharray="4 14"/>
  </g>

  <!-- Stars field -->
  <circle cx="45" cy="28" r="1" fill="#fff" class="star" style="animation-delay:0s"/>
  <circle cx="130" cy="55" r="0.7" fill="#e9d5ff" class="star" style="animation-delay:0.4s"/>
  <circle cx="220" cy="22" r="0.9" fill="#fff" class="star" style="animation-delay:0.9s"/>
  <circle cx="340" cy="40" r="0.6" fill="#a5f3fc" class="star" style="animation-delay:1.3s"/>
  <circle cx="480" cy="18" r="1.1" fill="#fff" class="star" style="animation-delay:1.8s"/>
  <circle cx="590" cy="35" r="0.8" fill="#fda4af" class="star" style="animation-delay:0.2s"/>
  <circle cx="680" cy="20" r="0.7" fill="#fff" class="star" style="animation-delay:2.1s"/>
  <circle cx="790" cy="42" r="1" fill="#e9d5ff" class="star" style="animation-delay:0.7s"/>
  <circle cx="860" cy="22" r="0.6" fill="#a5f3fc" class="star" style="animation-delay:1.6s"/>
  <circle cx="70" cy="310" r="0.8" fill="#fff" class="star" style="animation-delay:1.1s"/>
  <circle cx="200" cy="330" r="0.6" fill="#fda4af" class="star" style="animation-delay:2.4s"/>
  <circle cx="380" cy="320" r="0.9" fill="#fff" class="star" style="animation-delay:0.5s"/>
  <circle cx="550" cy="335" r="0.7" fill="#e9d5ff" class="star" style="animation-delay:1.9s"/>
  <circle cx="720" cy="318" r="0.8" fill="#a5f3fc" class="star" style="animation-delay:0.8s"/>
  <circle cx="840" cy="328" r="0.6" fill="#fff" class="star" style="animation-delay:2.7s"/>
  <circle cx="25" cy="170" r="0.5" fill="#c4b5fd" class="starSlow" style="animation-delay:0s"/>
  <circle cx="875" cy="180" r="0.6" fill="#c4b5fd" class="starSlow" style="animation-delay:2s"/>
  <circle cx="90" cy="130" r="0.4" fill="#fff" class="starSlow" style="animation-delay:1s"/>
  <circle cx="810" cy="120" r="0.5" fill="#a5f3fc" class="starSlow" style="animation-delay:3s"/>

  <!-- Decorative corner hexagons -->
  <g transform="translate(40, 85)" opacity="0.06" class="fl1">
    <polygon points="18,0 36,10 36,30 18,40 0,30 0,10" fill="none" stroke="#c084fc" stroke-width="1"/>
  </g>
  <g transform="translate(830, 250)" opacity="0.06" class="fl2">
    <polygon points="14,0 28,8 28,24 14,32 0,24 0,8" fill="none" stroke="#22d3ee" stroke-width="1"/>
  </g>

  <!-- ═══════ Top accent line ═══════ -->
  <line x1="180" y1="65" x2="720" y2="65" stroke="url(#accentLine)" stroke-width="1" opacity="0.6"/>

  <!-- ═══════ MAIN TITLE ═══════ -->
  <text x="450" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="900" fill="url(#titleG)" text-anchor="middle" filter="url(#glow)" letter-spacing="3">
    JAVA LAB 8
  </text>

  <!-- ═══════ SUBTITLE ═══════ -->
  <text x="450" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="7" font-weight="400">
    ENTERPRISE CLIENT-SERVER APPLICATION
  </text>

  <!-- ═══════ Accent line under subtitle ═══════ -->
  <line x1="300" y1="162" x2="600" y2="162" stroke="url(#accentLine)" stroke-width="0.8" opacity="0.35"/>

  <!-- ═══════ Terminal block ═══════ -->
  <g transform="translate(175, 180)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="550" height="60" rx="8" fill="#0c0a1e" stroke="#1e1b4b" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="550" height="20" rx="8" fill="#1a1744" opacity="0.5"/>
    <rect x="0" y="12" width="550" height="8" fill="#1a1744" opacity="0.5"/>
    <!-- Traffic lights -->
    <circle cx="16" cy="10" r="4" fill="#f43f5e" opacity="0.7"/>
    <circle cx="30" cy="10" r="4" fill="#f59e0b" opacity="0.7"/>
    <circle cx="44" cy="10" r="4" fill="#22c55e" opacity="0.7"/>
    <!-- Terminal title -->
    <text x="275" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">terminal — java@itmo</text>

    <!-- Command line -->
    <text x="16" y="42" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13">
      <tspan fill="#a78bfa">❯</tspan>
      <tspan fill="#94a3b8"> java </tspan>
      <tspan fill="#f472b6">--module-path</tspan>
      <tspan fill="#94a3b8"> fx </tspan>
      <tspan fill="#22d3ee">Server</tspan>
      <tspan fill="#64748b"> &amp; </tspan>
      <tspan fill="#22d3ee">Client</tspan>
    </text>
    <!-- Blinking cursor -->
    <rect x="370" y="31" width="9" height="15" rx="1" fill="#7c3aed" class="cursor" opacity="0.9"/>

    <!-- Output line -->
    <text x="16" y="56" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="10" fill="#22c55e" opacity="0.6">
      ✓ Server started on port 8080 — NIO Selector ready
    </text>
  </g>

  <!-- ═══════ Tech Pills Row ═══════ -->
  <g transform="translate(145, 260)">
    <!-- Java -->
    <rect x="0" y="0" width="85" height="26" rx="13" fill="url(#pillBg)" stroke="#7c3aed" stroke-width="0.7">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="42" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c084fc" text-anchor="middle" font-weight="600">☕ Java 21</text>

    <!-- JavaFX -->
    <rect x="95" y="0" width="85" height="26" rx="13" fill="url(#pillBg)" stroke="#06b6d4" stroke-width="0.7">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3.4s" repeatCount="indefinite"/>
    </rect>
    <text x="137" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#22d3ee" text-anchor="middle" font-weight="600">🎨 JavaFX</text>

    <!-- PostgreSQL -->
    <rect x="190" y="0" width="105" height="26" rx="13" fill="url(#pillBg)" stroke="#3b82f6" stroke-width="0.7">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <text x="242" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="600">🐘 PostgreSQL</text>

    <!-- NIO -->
    <rect x="305" y="0" width="85" height="26" rx="13" fill="url(#pillBg)" stroke="#84cc16" stroke-width="0.7">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <text x="347" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a3e635" text-anchor="middle" font-weight="600">⚡ NIO</text>

    <!-- Log4j2 -->
    <rect x="400" y="0" width="85" height="26" rx="13" fill="url(#pillBg)" stroke="#f43f5e" stroke-width="0.7">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <text x="442" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fb7185" text-anchor="middle" font-weight="600">📋 Log4j2</text>

    <!-- JDBC -->
    <rect x="495" y="0" width="70" height="26" rx="13" fill="url(#pillBg)" stroke="#f59e0b" stroke-width="0.7">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="530" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="600">🔗 JDBC</text>
  </g>

  <!-- ═══════ Bottom accent line ═══════ -->
  <line x1="200" y1="305" x2="700" y2="305" stroke="url(#accentLine)" stroke-width="0.6" opacity="0.25"/>

  <!-- ═══════ Footer text ═══════ -->
  <text x="450" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="3">
    ITMO UNIVERSITY  •  SPRING 2026  •  v8.0
  </text>
</svg>
