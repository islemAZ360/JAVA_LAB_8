<svg xmlns="http://www.w3.org/2000/svg" width="900" height="2" viewBox="0 0 900 2">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#7c3aed;stop-opacity:1">
        <animate attributeName="stop-color" values="#7c3aed;#06b6d4;#f43f5e;#7c3aed" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1">
        <animate attributeName="stop-color" values="#06b6d4;#f43f5e;#7c3aed;#06b6d4" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%" style="stop-color:#f43f5e;stop-opacity:1">
        <animate attributeName="stop-color" values="#f43f5e;#7c3aed;#06b6d4;#f43f5e" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="2" fill="url(#lineGrad)" rx="1"/>
</svg>
