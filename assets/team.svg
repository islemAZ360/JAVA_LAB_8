<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bgT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="glT">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes cardPulse { 0%,100% { stroke-opacity:0.3; } 50% { stroke-opacity:0.8; } }
    @keyframes badgeFade { 0% { opacity:0; } 100% { opacity:1; } }
    @keyframes starT { 0%,100% { opacity:0.15; } 50% { opacity:0.5; } }
    .cp { animation: cardPulse 3s ease-in-out infinite; }
    .stT { animation: starT 4s ease-in-out infinite; }
  </style>

  <rect width="900" height="280" rx="16" fill="url(#bgT)"/>
  <rect x="1" y="1" width="898" height="278" rx="16" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.2"/>

  <!-- Stars -->
  <circle cx="30" cy="20" r="0.7" fill="#fff" class="stT"/>
  <circle cx="870" cy="18" r="0.8" fill="#c4b5fd" class="stT" style="animation-delay:1s"/>
  <circle cx="450" cy="268" r="0.6" fill="#a5f3fc" class="stT" style="animation-delay:2s"/>

  <!-- Title -->
  <text x="450" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="5" font-weight="600">DEVELOPMENT TEAM — НЕЙРО 1.1</text>

  <!-- ============================== CARD 1 ============================== -->
  <rect x="25" y="55" width="270" height="205" rx="12" fill="url(#card1)" stroke="#7c3aed" stroke-width="1.2" class="cp"/>
  
  <!-- Trophy + Name -->
  <text x="160" y="85" font-size="22" text-anchor="middle">🏆</text>
  <text x="160" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="700">ИСЛАМ АЗАЙЗИЯ</text>
  <line x1="80" y1="118" x2="240" y2="118" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>

  <!-- Tasks -->
  <text x="50" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a78bfa">▸ Архитектура DTO</text>
  <text x="50" y="158" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a78bfa">▸ Сериализация данных</text>
  <text x="50" y="176" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a78bfa">▸ Логирование (Log4j2)</text>
  <text x="50" y="194" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a78bfa">▸ Интеграция UI и Сети</text>
  <text x="50" y="212" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a78bfa">▸ Stream API фильтрация</text>
  <text x="50" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a78bfa">▸ Thread-safety</text>
  <text x="50" y="248" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a78bfa">▸ Фоновое авто-обновление</text>

  <!-- ============================== CARD 2 ============================== -->
  <rect x="315" y="55" width="270" height="205" rx="12" fill="url(#card2)" stroke="#06b6d4" stroke-width="1.2" class="cp" style="animation-delay:1s"/>

  <text x="450" y="85" font-size="22" text-anchor="middle">🏆</text>
  <text x="450" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="700">Чы Нгок Чыонг</text>
  <line x1="370" y1="118" x2="530" y2="118" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>

  <text x="340" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#67e8f9">▸ Базовая настройка JavaFX</text>
  <text x="340" y="158" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#67e8f9">▸ Маршрутизация (Router)</text>
  <text x="340" y="176" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#67e8f9">▸ Регистрация / Авторизация</text>
  <text x="340" y="194" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#67e8f9">▸ Компоненты UI</text>
  <text x="340" y="212" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#67e8f9">▸ Terminal</text>
  <text x="340" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#67e8f9">▸ Dialogs</text>

  <!-- ============================== CARD 3 ============================== -->
  <rect x="605" y="55" width="270" height="205" rx="12" fill="url(#card3)" stroke="#f59e0b" stroke-width="1.2" class="cp" style="animation-delay:2s"/>

  <text x="740" y="85" font-size="22" text-anchor="middle">🏆</text>
  <text x="740" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="700">Дао Мань Зыонг</text>
  <line x1="660" y1="118" x2="820" y2="118" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>

  <text x="630" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fcd34d">▸ JDBC и PostgreSQL</text>
  <text x="630" y="158" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fcd34d">▸ Многопоточный сервер</text>
  <text x="630" y="176" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fcd34d">▸ NIO и ThreadPools</text>
  <text x="630" y="194" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fcd34d">▸ Интернационализация (i18n)</text>
  <text x="630" y="212" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fcd34d">▸ Визуализация на Canvas</text>
</svg>
