<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="bgArch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d0221"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="flowGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="flowGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glowA">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrA">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Animated dot marker -->
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes pulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }
    @keyframes dataFlow1 { 0% { offset-distance: 0%; opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { offset-distance: 100%; opacity:0; } }
    @keyframes dataFlow2 { 0% { offset-distance: 100%; opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { offset-distance: 0%; opacity:0; } }
    @keyframes borderPulse { 0%,100% { stroke-opacity:0.3; } 50% { stroke-opacity:0.8; } }
    @keyframes fadeSlide { 0% { opacity:0; transform:translateY(5px); } 100% { opacity:1; transform:translateY(0); } }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes twinkleA { 0%,100% { opacity:0.15; } 50% { opacity:0.6; } }
    @keyframes packetMove1 {
      0%   { cx: 305; cy: 120; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { cx: 435; cy: 120; opacity: 0; }
    }
    @keyframes packetMove1R {
      0%   { cx: 435; cy: 140; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { cx: 305; cy: 140; opacity: 0; }
    }
    @keyframes packetMove2 {
      0%   { cx: 595; cy: 120; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { cx: 705; cy: 120; opacity: 0; }
    }
    @keyframes packetMove2R {
      0%   { cx: 705; cy: 140; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { cx: 595; cy: 140; opacity: 0; }
    }
    @keyframes subBoxGlow { 0%,100% { stroke-opacity:0.2; } 50% { stroke-opacity:0.6; } }
    .pkt1 { animation: packetMove1 2.5s ease-in-out infinite; }
    .pkt1r { animation: packetMove1R 2.5s ease-in-out infinite; animation-delay: 1.2s; }
    .pkt2 { animation: packetMove2 2s ease-in-out infinite; animation-delay: 0.5s; }
    .pkt2r { animation: packetMove2R 2s ease-in-out infinite; animation-delay: 1.7s; }
    .border-p { animation: borderPulse 3s ease-in-out infinite; }
    .star-a { animation: twinkleA 4s ease-in-out infinite; }
    .sub-glow { animation: subBoxGlow 4s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="420" rx="16" fill="url(#bgArch)"/>
  <rect x="1" y="1" width="898" height="418" rx="16" fill="none" stroke="#7c3aed" stroke-width="1" class="border-p"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="70" x2="900" y2="70" stroke="#7c3aed"/>
    <line x1="0" y1="140" x2="900" y2="140" stroke="#7c3aed"/>
    <line x1="0" y1="210" x2="900" y2="210" stroke="#7c3aed"/>
    <line x1="0" y1="280" x2="900" y2="280" stroke="#7c3aed"/>
    <line x1="0" y1="350" x2="900" y2="350" stroke="#7c3aed"/>
    <line x1="150" y1="0" x2="150" y2="420" stroke="#7c3aed"/>
    <line x1="300" y1="0" x2="300" y2="420" stroke="#7c3aed"/>
    <line x1="450" y1="0" x2="450" y2="420" stroke="#7c3aed"/>
    <line x1="600" y1="0" x2="600" y2="420" stroke="#7c3aed"/>
    <line x1="750" y1="0" x2="750" y2="420" stroke="#7c3aed"/>
  </g>

  <!-- Stars -->
  <circle cx="40" cy="30" r="0.8" fill="#fff" class="star-a"/>
  <circle cx="860" cy="25" r="1" fill="#c4b5fd" class="star-a" style="animation-delay:1s"/>
  <circle cx="200" cy="15" r="0.6" fill="#a5f3fc" class="star-a" style="animation-delay:2s"/>
  <circle cx="700" cy="12" r="0.7" fill="#fff" class="star-a" style="animation-delay:0.5s"/>
  <circle cx="500" cy="408" r="0.6" fill="#fda4af" class="star-a" style="animation-delay:1.5s"/>
  <circle cx="100" cy="400" r="0.8" fill="#fff" class="star-a" style="animation-delay:2.5s"/>
  <circle cx="820" cy="395" r="0.7" fill="#c4b5fd" class="star-a" style="animation-delay:0.8s"/>

  <!-- Title -->
  <text x="450" y="42" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle" letter-spacing="6" font-weight="600">SYSTEM ARCHITECTURE</text>
  <line x1="300" y1="52" x2="600" y2="52" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>

  <!-- ============================== -->
  <!-- CLIENT BOX -->
  <!-- ============================== -->
  <rect x="70" y="85" width="230" height="110" rx="12" fill="url(#clientGrad)" stroke="#7c3aed" stroke-width="1.5" class="border-p"/>
  <!-- Icon circle -->
  <circle cx="130" cy="115" r="16" fill="#7c3aed" opacity="0.2"/>
  <text x="130" y="121" font-size="18" text-anchor="middle">🖥️</text>
  <!-- Title -->
  <text x="200" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#c084fc" font-weight="700">CLIENT</text>
  <text x="200" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b">JavaFX Application</text>
  <!-- Sub items -->
  <text x="100" y="160" font-family="'Cascadia Code', monospace" font-size="10" fill="#a78bfa">▸ UI Components</text>
  <text x="100" y="175" font-family="'Cascadia Code', monospace" font-size="10" fill="#a78bfa">▸ Router / EventBus</text>
  <text x="200" y="160" font-family="'Cascadia Code', monospace" font-size="10" fill="#a78bfa">▸ i18n (4 Locales)</text>
  <text x="200" y="175" font-family="'Cascadia Code', monospace" font-size="10" fill="#a78bfa">▸ Canvas Radar</text>

  <!-- ============================== -->
  <!-- SERVER BOX -->
  <!-- ============================== -->
  <rect x="430" y="85" width="230" height="110" rx="12" fill="url(#serverGrad)" stroke="#06b6d4" stroke-width="1.5" class="border-p" style="animation-delay:1s"/>
  <circle cx="490" cy="115" r="16" fill="#06b6d4" opacity="0.2"/>
  <text x="490" y="121" font-size="18" text-anchor="middle">⚙️</text>
  <text x="565" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#22d3ee" font-weight="700">SERVER</text>
  <text x="565" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b">NIO + Multithreading</text>
  <text x="460" y="160" font-family="'Cascadia Code', monospace" font-size="10" fill="#67e8f9">▸ Selector Loop</text>
  <text x="460" y="175" font-family="'Cascadia Code', monospace" font-size="10" fill="#67e8f9">▸ ForkJoinPool</text>
  <text x="580" y="160" font-family="'Cascadia Code', monospace" font-size="10" fill="#67e8f9">▸ Command Handler</text>
  <text x="580" y="175" font-family="'Cascadia Code', monospace" font-size="10" fill="#67e8f9">▸ Auth Service</text>

  <!-- ============================== -->
  <!-- DATABASE BOX -->
  <!-- ============================== -->
  <rect x="710" y="85" width="160" height="110" rx="12" fill="url(#dbGrad)" stroke="#f59e0b" stroke-width="1.5" class="border-p" style="animation-delay:2s"/>
  <circle cx="750" cy="115" r="16" fill="#f59e0b" opacity="0.2"/>
  <text x="750" y="121" font-size="18" text-anchor="middle">🐘</text>
  <text x="820" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#fbbf24" font-weight="700">PostgreSQL</text>
  <text x="820" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b">JDBC / Repository</text>
  <text x="735" y="160" font-family="'Cascadia Code', monospace" font-size="10" fill="#fcd34d">▸ Users Table</text>
  <text x="735" y="175" font-family="'Cascadia Code', monospace" font-size="10" fill="#fcd34d">▸ HumanBeing</text>

  <!-- ============================== -->
  <!-- CONNECTION LINES + ANIMATED PACKETS -->
  <!-- ============================== -->
  
  <!-- Client → Server line -->
  <line x1="300" y1="125" x2="430" y2="125" stroke="url(#flowGrad1)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <line x1="300" y1="145" x2="430" y2="145" stroke="url(#flowGrad1)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <!-- Arrow heads -->
  <polygon points="425,120 435,125 425,130" fill="#06b6d4" opacity="0.8"/>
  <polygon points="310,140 300,145 310,150" fill="#7c3aed" opacity="0.8"/>
  
  <!-- Animated data packets Client↔Server -->
  <circle r="4" fill="#c084fc" filter="url(#glowA)" class="pkt1"/>
  <circle r="4" fill="#22d3ee" filter="url(#glowA)" class="pkt1r"/>
  
  <!-- Label -->
  <rect x="330" y="105" width="70" height="16" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="365" y="116" font-family="'Cascadia Code', monospace" font-size="9" fill="#c084fc" text-anchor="middle">TCP/NIO</text>
  <rect x="328" y="147" width="75" height="16" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <text x="365" y="158" font-family="'Cascadia Code', monospace" font-size="9" fill="#22d3ee" text-anchor="middle">Response</text>

  <!-- Server → DB line -->
  <line x1="660" y1="125" x2="710" y2="125" stroke="url(#flowGrad2)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <line x1="660" y1="145" x2="710" y2="145" stroke="url(#flowGrad2)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <polygon points="705,120 715,125 705,130" fill="#f59e0b" opacity="0.8"/>
  <polygon points="665,140 660,145 665,150" fill="#06b6d4" opacity="0.8"/>
  
  <!-- Animated data packets Server↔DB -->
  <circle r="3" fill="#22d3ee" filter="url(#glowA)" class="pkt2"/>
  <circle r="3" fill="#fbbf24" filter="url(#glowA)" class="pkt2r"/>

  <rect x="655" y="105" width="55" height="16" rx="4" fill="#0f172a" opacity="0.7"/>
  <text x="682" y="116" font-family="'Cascadia Code', monospace" font-size="9" fill="#fbbf24" text-anchor="middle">JDBC</text>

  <!-- ============================== -->
  <!-- DESIGN PATTERNS SECTION BELOW -->
  <!-- ============================== -->
  <line x1="50" y1="225" x2="850" y2="225" stroke="#7c3aed" stroke-width="0.5" opacity="0.15"/>
  <text x="450" y="250" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="4">DESIGN PATTERNS</text>

  <!-- Pattern boxes -->
  <!-- DTO -->
  <rect x="45" y="270" width="155" height="60" rx="10" fill="#0d0221" stroke="#7c3aed" stroke-width="1" class="sub-glow"/>
  <text x="122" y="293" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#c084fc" text-anchor="middle" font-weight="700">📦 DTO</text>
  <text x="122" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Request / Response</text>

  <!-- Command -->
  <rect x="215" y="270" width="155" height="60" rx="10" fill="#0d0221" stroke="#06b6d4" stroke-width="1" class="sub-glow" style="animation-delay:0.8s"/>
  <text x="292" y="293" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="700">⚙️ Command</text>
  <text x="292" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Encapsulated Operations</text>

  <!-- Repository -->
  <rect x="385" y="270" width="155" height="60" rx="10" fill="#0d0221" stroke="#f59e0b" stroke-width="1" class="sub-glow" style="animation-delay:1.6s"/>
  <text x="462" y="293" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="700">🗄️ Repository</text>
  <text x="462" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Database Isolation</text>

  <!-- Observer -->
  <rect x="555" y="270" width="155" height="60" rx="10" fill="#0d0221" stroke="#f43f5e" stroke-width="1" class="sub-glow" style="animation-delay:2.4s"/>
  <text x="632" y="293" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#fb7185" text-anchor="middle" font-weight="700">📡 EventBus</text>
  <text x="632" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Reactive UI Updates</text>

  <!-- Factory -->
  <rect x="725" y="270" width="155" height="60" rx="10" fill="#0d0221" stroke="#84cc16" stroke-width="1" class="sub-glow" style="animation-delay:3.2s"/>
  <text x="802" y="293" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#a3e635" text-anchor="middle" font-weight="700">🏭 Factory</text>
  <text x="802" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Singleton Services</text>

  <!-- ============================== -->
  <!-- DATA FLOW LEGEND -->
  <!-- ============================== -->
  <rect x="200" y="355" width="500" height="45" rx="10" fill="#0d0221" stroke="#312e81" stroke-width="0.5" opacity="0.6"/>
  
  <circle cx="240" cy="378" r="5" fill="#c084fc" filter="url(#glowA)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="254" y="382" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Request Flow</text>

  <circle cx="380" cy="378" r="5" fill="#22d3ee" filter="url(#glowA)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <text x="394" y="382" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Response Flow</text>
  
  <circle cx="520" cy="378" r="5" fill="#fbbf24" filter="url(#glowA)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <text x="534" y="382" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Database Query</text>
  
  <line x1="620" y1="370" x2="650" y2="370" stroke="#64748b" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="658" y="374" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Async Channel</text>
</svg>
