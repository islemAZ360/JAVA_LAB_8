<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180">
  <defs>
    <linearGradient id="bgF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#150734;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="quoteGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc">
        <animate attributeName="stop-color" values="#c084fc;#22d3ee;#c084fc" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#c084fc;#22d3ee" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glowF">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes twinkleF { 0%,100% { opacity:0.2; } 50% { opacity:1; } }
    @keyframes pulseBar { 0%,100% { opacity:0.3; } 50% { opacity:0.8; } }
    .starF { animation: twinkleF 3s ease-in-out infinite; }
    .bar-pulse { animation: pulseBar 3s ease-in-out infinite; }
  </style>
  
  <rect width="900" height="180" rx="16" fill="url(#bgF)"/>
  <rect x="1" y="1" width="898" height="178" rx="16" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.3"/>
  
  <!-- Stars -->
  <circle cx="50" cy="30" r="0.8" fill="#fff" class="starF" style="animation-delay:0s"/>
  <circle cx="150" cy="50" r="0.6" fill="#c4b5fd" class="starF" style="animation-delay:0.5s"/>
  <circle cx="750" cy="25" r="0.9" fill="#fff" class="starF" style="animation-delay:1s"/>
  <circle cx="850" cy="55" r="0.7" fill="#a5f3fc" class="starF" style="animation-delay:1.5s"/>
  <circle cx="400" cy="20" r="0.5" fill="#fda4af" class="starF" style="animation-delay:2s"/>
  <circle cx="600" cy="160" r="0.6" fill="#fff" class="starF" style="animation-delay:0.8s"/>
  
  <!-- Left accent bar -->
  <rect x="180" y="40" width="3" height="100" rx="1.5" fill="url(#quoteGrad)" class="bar-pulse"/>
  
  <!-- Quote marks -->
  <text x="200" y="62" font-family="Georgia, serif" font-size="40" fill="#7c3aed" opacity="0.3">«</text>
  
  <!-- Quote text -->
  <text x="450" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-style="italic" letter-spacing="0.5">
    Программирование — это не просто написание кода.
  </text>
  <text x="450" y="105" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-style="italic" letter-spacing="0.5">
    Это создание архитектуры, которая выдержит испытание временем.
  </text>
  
  <!-- Closing quote -->
  <text x="690" y="120" font-family="Georgia, serif" font-size="40" fill="#7c3aed" opacity="0.3">»</text>
  
  <!-- Attribution -->
  <text x="450" y="150" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7c3aed" text-anchor="middle" letter-spacing="4" filter="url(#glowF)">
    2026 © ИТМО | ФАКУЛЬТЕТ ПИиКТ
  </text>
</svg>
