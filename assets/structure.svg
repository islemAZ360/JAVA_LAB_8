<svg xmlns="http://www.w3.org/2000/svg" width="900" height="850" viewBox="0 0 900 850">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d0221"/>
    </linearGradient>
    <linearGradient id="glowClient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowServer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowCommon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <style>
    .line-tree { stroke: #334155; stroke-width: 1.5; stroke-dasharray: 4 4; fill: none; }
    .folder { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #e2e8f0; }
    .file { font-family: 'Cascadia Code', monospace; font-size: 13px; fill: #94a3b8; }
    .comment { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #64748b; font-style: italic; }
    .highlight-c { fill: #c084fc; }
    .highlight-s { fill: #22d3ee; }
    .highlight-m { fill: #fbbf24; }
    .icon { font-size: 15px; }
    @keyframes pulse { 0%,100% { stroke-opacity:0.3; } 50% { stroke-opacity:0.8; } }
    .border-anim { animation: pulse 4s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="850" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="848" rx="16" fill="none" stroke="#7c3aed" stroke-width="1" class="border-anim"/>

  <!-- Window Controls -->
  <circle cx="20" cy="20" r="5" fill="#f43f5e"/>
  <circle cx="35" cy="20" r="5" fill="#f59e0b"/>
  <circle cx="50" cy="20" r="5" fill="#22c55e"/>
  <text x="450" y="24" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="2">PROJECT_STRUCTURE</text>
  <line x1="0" y1="40" x2="900" y2="40" stroke="#1e293b" stroke-width="1"/>

  <!-- Root -->
  <text x="40" y="70" class="folder highlight-c" font-size="16">JAVA_LAB_8/</text>

  <!-- ==================== SRC MAIN JAVA ==================== -->
  <text x="40" y="100" class="icon">📂</text>
  <text x="65" y="100" class="folder">src/main/java/</text>
  
  <path d="M 50 110 L 50 580" class="line-tree"/> <!-- Main Java Line -->

  <!-- CLIENT -->
  <rect x="70" y="112" width="800" height="225" rx="8" fill="url(#glowClient)"/>
  <path d="M 50 125 L 70 125" class="line-tree"/>
  <text x="75" y="130" class="icon">🖥️</text>
  <text x="100" y="130" class="folder highlight-c">client/</text>
  <text x="350" y="130" class="comment">Клиентская часть (JavaFX)</text>

  <path d="M 85 140 L 85 320" class="line-tree"/> <!-- Client vertical line -->
  
  <path d="M 85 155 L 105 155" class="line-tree"/>
  <text x="110" y="160" class="icon">🎨</text>
  <text x="135" y="160" class="folder">gui/</text>

  <path d="M 120 170 L 120 290" class="line-tree"/> <!-- GUI vertical line -->
  
  <path d="M 120 185 L 135 185" class="line-tree"/>
  <text x="145" y="190" class="file">components/</text>
  <text x="350" y="190" class="comment">UI-компоненты (Button, Table, Input...)</text>

  <path d="M 120 210 L 135 210" class="line-tree"/>
  <text x="145" y="215" class="file">pages/</text>
  <text x="350" y="215" class="comment">Страницы приложения</text>

  <path d="M 120 235 L 135 235" class="line-tree"/>
  <text x="145" y="240" class="file">core/</text>
  <text x="350" y="240" class="comment">Messages, Theme, CssLoader</text>

  <path d="M 120 260 L 135 260" class="line-tree"/>
  <text x="145" y="265" class="file">router/</text>
  <text x="350" y="265" class="comment">Навигация между страницами</text>

  <path d="M 120 285 L 135 285" class="line-tree"/>
  <text x="145" y="290" class="file">integration/</text>
  <text x="350" y="290" class="comment">Шлюзы к серверу</text>

  <!-- Terminal.java -->
  <path d="M 85 315 L 105 315" class="line-tree"/>
  <text x="110" y="320" class="icon">💻</text>
  <text x="135" y="320" class="file">Terminal.java</text>
  <text x="350" y="320" class="comment">Консольный клиент</text>


  <!-- SERVER -->
  <rect x="70" y="345" width="800" height="115" rx="8" fill="url(#glowServer)"/>
  <path d="M 50 360 L 70 360" class="line-tree"/>
  <text x="75" y="365" class="icon">⚙️</text>
  <text x="100" y="365" class="folder highlight-s">server/</text>
  <text x="350" y="365" class="comment">Серверная часть (NIO)</text>

  <path d="M 85 375 L 85 440" class="line-tree"/> <!-- Server vertical line -->
  
  <path d="M 85 390 L 105 390" class="line-tree"/>
  <text x="110" y="395" class="icon">⚡</text>
  <text x="135" y="395" class="file">Server.java</text>
  <text x="350" y="395" class="comment">NIO Selector + Event Loop</text>

  <path d="M 85 415 L 105 415" class="line-tree"/>
  <text x="110" y="420" class="icon">📋</text>
  <text x="135" y="420" class="file">RequestHandler.java</text>
  <text x="350" y="420" class="comment">Обработка команд</text>

  <path d="M 85 440 L 105 440" class="line-tree"/>
  <text x="110" y="445" class="icon">🗄️</text>
  <text x="135" y="445" class="folder">repository/</text>
  <text x="350" y="445" class="comment">JDBC → PostgreSQL</text>


  <!-- COMMON -->
  <rect x="70" y="470" width="800" height="115" rx="8" fill="url(#glowCommon)"/>
  <path d="M 50 485 L 70 485" class="line-tree"/>
  <text x="75" y="490" class="icon">📦</text>
  <text x="100" y="490" class="folder highlight-m">common/</text>
  <text x="350" y="490" class="comment">Общие модули</text>

  <path d="M 85 500 L 85 565" class="line-tree"/> <!-- Common vertical line -->

  <path d="M 85 515 L 105 515" class="line-tree"/>
  <text x="110" y="520" class="folder">dto/</text>
  <text x="350" y="520" class="comment">Request, Response, StatusCode</text>

  <path d="M 85 540 L 105 540" class="line-tree"/>
  <text x="110" y="545" class="folder">model/</text>
  <text x="350" y="545" class="comment">HumanBeing, Car, Coordinates</text>

  <path d="M 85 565 L 105 565" class="line-tree"/>
  <text x="110" y="570" class="folder">utils/</text>
  <text x="350" y="570" class="comment">Валидация, IO утилиты</text>


  <!-- ==================== RESOURCES & OTHERS ==================== -->
  <path d="M 25 75 L 25 805" class="line-tree"/> <!-- Root vertical line -->

  <path d="M 25 615 L 40 615" class="line-tree"/>
  <text x="45" y="620" class="icon">🎨</text>
  <text x="70" y="620" class="folder">src/main/resources/</text>

  <path d="M 50 630 L 50 695" class="line-tree"/> <!-- Resources vertical line -->

  <path d="M 50 645 L 70 645" class="line-tree"/>
  <text x="75" y="650" class="folder">static/css/</text>
  <text x="350" y="650" class="comment">CSS-стили (Dark Theme)</text>

  <path d="M 50 670 L 70 670" class="line-tree"/>
  <text x="75" y="675" class="folder">config/</text>
  <text x="350" y="675" class="comment">config.properties</text>

  <path d="M 50 695 L 70 695" class="line-tree"/>
  <text x="75" y="700" class="folder">static/icons/</text>
  <text x="350" y="700" class="comment">Иконки и графика</text>

  <!-- Scripts, lib, logs -->
  <path d="M 25 730 L 40 730" class="line-tree"/>
  <text x="45" y="735" class="icon">🔧</text>
  <text x="70" y="735" class="folder">scripts/</text>
  <text x="350" y="735" class="comment">SQL скрипты инициализации</text>

  <path d="M 25 765 L 40 765" class="line-tree"/>
  <text x="45" y="770" class="icon">📚</text>
  <text x="70" y="770" class="folder">lib/</text>
  <text x="350" y="770" class="comment">Зависимости (Log4j2, JDBC)</text>

  <path d="M 25 800 L 40 800" class="line-tree"/>
  <text x="45" y="805" class="icon">📋</text>
  <text x="70" y="805" class="folder">logs/</text>
  <text x="350" y="805" class="comment">Логи сервера</text>

  <!-- Accent Line Right Side -->
  <line x1="880" y1="112" x2="880" y2="337" stroke="#7c3aed" stroke-width="2" rx="1"/>
  <line x1="880" y1="345" x2="880" y2="460" stroke="#06b6d4" stroke-width="2" rx="1"/>
  <line x1="880" y1="470" x2="880" y2="585" stroke="#f59e0b" stroke-width="2" rx="1"/>

</svg>
