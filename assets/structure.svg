<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d0221"/>
    </linearGradient>
    <linearGradient id="glowClient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowServer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowCommon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .line-tree { stroke: #334155; stroke-width: 1.5; stroke-dasharray: 4 4; fill: none; }
    .folder { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #e2e8f0; }
    .file { font-family: 'Cascadia Code', monospace; font-size: 13px; fill: #94a3b8; }
    .comment { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #64748b; font-style: italic; }
    .highlight-c { fill: #c084fc; }
    .highlight-s { fill: #22d3ee; }
    .highlight-m { fill: #fbbf24; }
    .icon { font-size: 15px; }
    @keyframes pulse { 0%,100% { stroke-opacity:0.3; } 50% { stroke-opacity:0.8; } }
    .border-anim { animation: pulse 4s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="580" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="578" rx="16" fill="none" stroke="#7c3aed" stroke-width="1" class="border-anim"/>

  <!-- Window Controls -->
  <circle cx="20" cy="20" r="5" fill="#f43f5e"/>
  <circle cx="35" cy="20" r="5" fill="#f59e0b"/>
  <circle cx="50" cy="20" r="5" fill="#22c55e"/>
  <text x="450" y="24" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="2">PROJECT_STRUCTURE</text>
  <line x1="0" y1="40" x2="900" y2="40" stroke="#1e293b" stroke-width="1"/>

  <!-- Root -->
  <text x="40" y="70" class="folder highlight-c" font-size="16">JAVA_LAB_8/</text>

  <!-- ==================== SRC MAIN JAVA ==================== -->
  <text x="40" y="100" class="icon">📂</text>
  <text x="65" y="100" class="folder">src/main/java/</text>
  
  <path d="M 50 110 L 50 430" class="line-tree"/>

  <!-- CLIENT -->
  <rect x="70" y="112" width="800" height="135" rx="8" fill="url(#glowClient)"/>
  <path d="M 50 125 L 70 125" class="line-tree"/>
  <text x="75" y="130" class="icon">🖥️</text>
  <text x="100" y="130" class="folder highlight-c">client/</text>
  <text x="350" y="130" class="comment">Клиентская часть (JavaFX)</text>

  <path d="M 85 140 L 85 240" class="line-tree"/>
  
  <path d="M 85 155 L 105 155" class="line-tree"/>
  <text x="110" y="160" class="icon">🎨</text>
  <text x="135" y="160" class="folder">gui/</text>

  <path d="M 120 170 L 120 220" class="line-tree"/>
  
  <path d="M 120 180 L 135 180" class="line-tree"/>
  <text x="145" y="184" class="file">components/</text>
  <text x="350" y="184" class="comment">Button, Table, Input, Dialogs...</text>

  <path d="M 120 200 L 135 200" class="line-tree"/>
  <text x="145" y="204" class="file">pages/</text>
  <text x="350" y="204" class="comment">Dashboard, Login, Maps</text>

  <path d="M 120 220 L 135 220" class="line-tree"/>
  <text x="145" y="224" class="file">core/ &amp; router/</text>
  <text x="350" y="224" class="comment">Навигация, i18n, Theme Engine</text>

  <path d="M 85 240 L 105 240" class="line-tree"/>
  <text x="110" y="244" class="icon">💻</text>
  <text x="135" y="244" class="file">Terminal.java</text>
  <text x="350" y="244" class="comment">Консольный fallback-клиент</text>

  <!-- SERVER -->
  <rect x="70" y="255" width="800" height="90" rx="8" fill="url(#glowServer)"/>
  <path d="M 50 270 L 70 270" class="line-tree"/>
  <text x="75" y="275" class="icon">⚙️</text>
  <text x="100" y="275" class="folder highlight-s">server/</text>
  <text x="350" y="275" class="comment">Серверная часть (NIO)</text>

  <path d="M 85 285 L 85 330" class="line-tree"/>
  
  <path d="M 85 300 L 105 300" class="line-tree"/>
  <text x="110" y="304" class="icon">⚡</text>
  <text x="135" y="304" class="file">Server.java</text>
  <text x="350" y="304" class="comment">NIO Selector + Event Loop + Threads</text>

  <path d="M 85 320 L 105 320" class="line-tree"/>
  <text x="110" y="324" class="icon">🗄️</text>
  <text x="135" y="324" class="folder">repository/</text>
  <text x="350" y="324" class="comment">JDBC → PostgreSQL Integration</text>

  <!-- COMMON -->
  <rect x="70" y="355" width="800" height="90" rx="8" fill="url(#glowCommon)"/>
  <path d="M 50 370 L 70 370" class="line-tree"/>
  <text x="75" y="375" class="icon">📦</text>
  <text x="100" y="375" class="folder highlight-m">common/</text>
  <text x="350" y="375" class="comment">Общие модули и DTO</text>

  <path d="M 85 385 L 85 430" class="line-tree"/>

  <path d="M 85 400 L 105 400" class="line-tree"/>
  <text x="110" y="404" class="file">dto/</text>
  <text x="350" y="404" class="comment">Request, Response, UserData</text>

  <path d="M 85 420 L 105 420" class="line-tree"/>
  <text x="110" y="424" class="file">model/ &amp; utils/</text>
  <text x="350" y="424" class="comment">Сущности БД и валидаторы</text>


  <!-- ==================== RESOURCES & OTHERS ==================== -->
  <path d="M 25 75 L 25 540" class="line-tree"/>

  <path d="M 25 460 L 40 460" class="line-tree"/>
  <text x="45" y="465" class="icon">🎨</text>
  <text x="70" y="465" class="folder">src/main/resources/</text>
  <text x="350" y="465" class="comment">CSS-стили (Dark Mode), Иконки, Конфиги</text>

  <path d="M 25 490 L 40 490" class="line-tree"/>
  <text x="45" y="495" class="icon">📜</text>
  <text x="70" y="495" class="folder">scripts/init.sql</text>
  <text x="350" y="495" class="comment">SQL скрипт создания БД и таблиц</text>

  <path d="M 25 515 L 40 515" class="line-tree"/>
  <text x="45" y="520" class="icon">📚</text>
  <text x="70" y="520" class="folder">lib/</text>
  <text x="350" y="520" class="comment">Зависимости (PostgreSQL JDBC, Log4j2)</text>

  <path d="M 25 540 L 40 540" class="line-tree"/>
  <text x="45" y="545" class="icon">📋</text>
  <text x="70" y="545" class="folder">logs/</text>
  <text x="350" y="545" class="comment">Файлы логов сервера</text>

  <!-- Accent Line Right Side -->
  <line x1="880" y1="112" x2="880" y2="247" stroke="#7c3aed" stroke-width="2" rx="1"/>
  <line x1="880" y1="255" x2="880" y2="345" stroke="#06b6d4" stroke-width="2" rx="1"/>
  <line x1="880" y1="355" x2="880" y2="445" stroke="#f59e0b" stroke-width="2" rx="1"/>

</svg>
