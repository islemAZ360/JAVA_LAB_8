<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221"/>
      <stop offset="50%" style="stop-color:#080c16"/>
      <stop offset="100%" style="stop-color:#0d0221"/>
    </linearGradient>

    <!-- Card Backgrounds -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#151b2b; stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0a0d14; stop-opacity:0.9"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes float1 { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
    @keyframes float2 { 0%, 100% { transform: translateY(-3px); } 50% { transform: translateY(3px); } }
    
    @keyframes pulseC1 { 0%, 100% { stroke-opacity: 0.3; } 50% { stroke-opacity: 0.8; } }
    @keyframes pulseC2 { 0%, 100% { stroke-opacity: 0.3; } 50% { stroke-opacity: 0.8; } }
    @keyframes pulseC3 { 0%, 100% { stroke-opacity: 0.3; } 50% { stroke-opacity: 0.8; } }
    @keyframes pulseC4 { 0%, 100% { stroke-opacity: 0.3; } 50% { stroke-opacity: 0.8; } }
    @keyframes pulseC5 { 0%, 100% { stroke-opacity: 0.3; } 50% { stroke-opacity: 0.8; } }

    .g1 { animation: float1 4s ease-in-out infinite; }
    .g2 { animation: float2 5s ease-in-out infinite; }
    .g3 { animation: float1 4.5s ease-in-out infinite; }
    .g4 { animation: float2 4s ease-in-out infinite; }
    .g5 { animation: float1 5.5s ease-in-out infinite; }

    .card { fill: url(#cardBg); stroke-width: 1.5; rx: 12; }
    
    .card1 { stroke: #f59e0b; animation: pulseC1 3s infinite; }
    .card2 { stroke: #0ea5e9; animation: pulseC2 4s infinite 0.5s; }
    .card3 { stroke: #3b82f6; animation: pulseC3 3.5s infinite 1s; }
    .card4 { stroke: #ec4899; animation: pulseC4 4.5s infinite 1.5s; }
    .card5 { stroke: #ef4444; animation: pulseC5 3s infinite 2s; }

    .icon { font-size: 32px; text-anchor: middle; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 800; text-anchor: middle; fill: #e2e8f0; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Cascadia Code', monospace; font-size: 11px; text-anchor: middle; fill: #64748b; }
    
    /* Connection line */
    .conn-line { stroke: #334155; stroke-width: 1.5; stroke-dasharray: 4 4; opacity: 0.5; }
  </style>

  <!-- Background -->
  <rect width="900" height="220" rx="16" fill="url(#bgGlow)"/>
  
  <!-- Subtle Grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="50" x2="900" y2="50" />
    <line x1="0" y1="110" x2="900" y2="110" />
    <line x1="0" y1="170" x2="900" y2="170" />
  </g>

  <!-- Connecting Data Line behind cards -->
  <line x1="100" y1="110" x2="800" y2="110" class="conn-line"/>
  
  <!-- Animated data packets on the line -->
  <circle cx="100" cy="110" r="2" fill="#7c3aed">
    <animate attributeName="cx" values="100;800;100" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="110" r="2" fill="#22d3ee">
    <animate attributeName="cx" values="800;100;800" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Card 1: Java -->
  <g class="g1">
    <rect x="30" y="45" width="140" height="130" class="card card1" filter="url(#subtleGlow)"/>
    <text x="100" y="90" class="icon">☕</text>
    <text x="100" y="125" class="title" fill="#fcd34d">Java 21</text>
    <text x="100" y="145" class="subtitle">Core Platform</text>
  </g>

  <!-- Card 2: PostgreSQL -->
  <g class="g2">
    <rect x="205" y="45" width="140" height="130" class="card card2" filter="url(#subtleGlow)"/>
    <text x="275" y="90" class="icon">🐘</text>
    <text x="275" y="125" class="title" fill="#bae6fd">PostgreSQL</text>
    <text x="275" y="145" class="subtitle">Database</text>
  </g>

  <!-- Card 3: JavaFX CSS -->
  <g class="g3">
    <rect x="380" y="45" width="140" height="130" class="card card3" filter="url(#subtleGlow)"/>
    <text x="450" y="90" class="icon">🎨</text>
    <text x="450" y="125" class="title" fill="#bfdbfe">JavaFX CSS</text>
    <text x="450" y="145" class="subtitle">Styling Engine</text>
  </g>

  <!-- Card 4: IntelliJ IDEA -->
  <g class="g4">
    <rect x="555" y="45" width="140" height="130" class="card card4" filter="url(#subtleGlow)"/>
    <text x="625" y="90" class="icon">💻</text>
    <text x="625" y="125" class="title" fill="#fbcfe8">IntelliJ IDEA</text>
    <text x="625" y="145" class="subtitle">Development IDE</text>
  </g>

  <!-- Card 5: Git -->
  <g class="g5">
    <rect x="730" y="45" width="140" height="130" class="card card5" filter="url(#subtleGlow)"/>
    <text x="800" y="90" class="icon">🔀</text>
    <text x="800" y="125" class="title" fill="#fca5a5">Git</text>
    <text x="800" y="145" class="subtitle">Version Control</text>
  </g>

</svg>
