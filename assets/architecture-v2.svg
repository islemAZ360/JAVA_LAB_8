<svg xmlns="http://www.w3.org/2000/svg" width="900" height="450" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="bgArch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d0221"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="flowGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="flowGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glowA">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes borderPulse { 0%,100% { stroke-opacity:0.3; } 50% { stroke-opacity:0.8; } }
    @keyframes twinkleA { 0%,100% { opacity:0.15; } 50% { opacity:0.6; } }
    @keyframes subBoxGlow { 0%,100% { stroke-opacity:0.2; } 50% { stroke-opacity:0.7; } }
    @keyframes packetRight {
      0%   { cx: 290; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { cx: 390; opacity: 0; }
    }
    @keyframes packetLeft {
      0%   { cx: 390; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { cx: 290; opacity: 0; }
    }
    @keyframes packetRight2 {
      0%   { cx: 655; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { cx: 695; opacity: 0; }
    }
    @keyframes packetLeft2 {
      0%   { cx: 695; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { cx: 655; opacity: 0; }
    }
    .bp { animation: borderPulse 3s ease-in-out infinite; }
    .stA { animation: twinkleA 4s ease-in-out infinite; }
    .sg { animation: subBoxGlow 4s ease-in-out infinite; }
    .pr  { animation: packetRight 2.5s ease-in-out infinite; }
    .pl  { animation: packetLeft 2.5s ease-in-out infinite; animation-delay: 1.2s; }
    .pr2 { animation: packetRight2 2s ease-in-out infinite; animation-delay: 0.5s; }
    .pl2 { animation: packetLeft2 2s ease-in-out infinite; animation-delay: 1.7s; }
  </style>

  <!-- Background -->
  <rect width="900" height="450" rx="16" fill="url(#bgArch)"/>
  <rect x="1" y="1" width="898" height="448" rx="16" fill="none" stroke="#7c3aed" stroke-width="1" class="bp"/>

  <!-- Grid -->
  <g opacity="0.03">
    <line x1="0" y1="75" x2="900" y2="75" stroke="#7c3aed"/>
    <line x1="0" y1="150" x2="900" y2="150" stroke="#7c3aed"/>
    <line x1="0" y1="225" x2="900" y2="225" stroke="#7c3aed"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#7c3aed"/>
    <line x1="0" y1="375" x2="900" y2="375" stroke="#7c3aed"/>
    <line x1="150" y1="0" x2="150" y2="450" stroke="#7c3aed"/>
    <line x1="300" y1="0" x2="300" y2="450" stroke="#7c3aed"/>
    <line x1="450" y1="0" x2="450" y2="450" stroke="#7c3aed"/>
    <line x1="600" y1="0" x2="600" y2="450" stroke="#7c3aed"/>
    <line x1="750" y1="0" x2="750" y2="450" stroke="#7c3aed"/>
  </g>

  <!-- Stars -->
  <circle cx="40" cy="30" r="0.8" fill="#fff" class="stA"/>
  <circle cx="860" cy="25" r="1" fill="#c4b5fd" class="stA" style="animation-delay:1s"/>
  <circle cx="200" cy="15" r="0.6" fill="#a5f3fc" class="stA" style="animation-delay:2s"/>
  <circle cx="700" cy="12" r="0.7" fill="#fff" class="stA" style="animation-delay:0.5s"/>
  <circle cx="500" cy="438" r="0.6" fill="#fda4af" class="stA" style="animation-delay:1.5s"/>
  <circle cx="100" cy="430" r="0.8" fill="#fff" class="stA" style="animation-delay:2.5s"/>
  <circle cx="820" cy="435" r="0.7" fill="#c4b5fd" class="stA" style="animation-delay:0.8s"/>

  <!-- Title -->
  <text x="450" y="45" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle" letter-spacing="6" font-weight="600">SYSTEM ARCHITECTURE</text>
  <line x1="300" y1="55" x2="600" y2="55" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>

  <!-- ===================== CLIENT BOX ===================== -->
  <rect x="30" y="80" width="255" height="150" rx="12" fill="url(#clientGrad)" stroke="#7c3aed" stroke-width="1.5" class="bp"/>

  <text x="157" y="108" font-size="20" text-anchor="middle">🖥️</text>
  <text x="157" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#c084fc" text-anchor="middle" font-weight="700">CLIENT</text>
  <text x="157" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">JavaFX Application</text>
  <line x1="60" y1="156" x2="255" y2="156" stroke="#7c3aed" stroke-width="0.5" opacity="0.2"/>

  <text x="55" y="175" font-family="'Cascadia Code', monospace" font-size="10" fill="#a78bfa">▸ UI Components</text>
  <text x="55" y="193" font-family="'Cascadia Code', monospace" font-size="10" fill="#a78bfa">▸ Router / EventBus</text>
  <text x="55" y="211" font-family="'Cascadia Code', monospace" font-size="10" fill="#a78bfa">▸ i18n (4 Locales)</text>
  <text x="165" y="175" font-family="'Cascadia Code', monospace" font-size="10" fill="#a78bfa">▸ Canvas Radar</text>
  <text x="165" y="193" font-family="'Cascadia Code', monospace" font-size="10" fill="#a78bfa">▸ Dark Theme</text>
  <text x="165" y="211" font-family="'Cascadia Code', monospace" font-size="10" fill="#a78bfa">▸ Terminal</text>

  <!-- ===================== SERVER BOX ===================== -->
  <rect x="395" y="80" width="255" height="150" rx="12" fill="url(#serverGrad)" stroke="#06b6d4" stroke-width="1.5" class="bp" style="animation-delay:1s"/>

  <text x="522" y="108" font-size="20" text-anchor="middle">⚙️</text>
  <text x="522" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#22d3ee" text-anchor="middle" font-weight="700">SERVER</text>
  <text x="522" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">NIO + Multithreading</text>
  <line x1="425" y1="156" x2="620" y2="156" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>

  <text x="420" y="175" font-family="'Cascadia Code', monospace" font-size="10" fill="#67e8f9">▸ Selector Loop</text>
  <text x="420" y="193" font-family="'Cascadia Code', monospace" font-size="10" fill="#67e8f9">▸ ForkJoinPool</text>
  <text x="420" y="211" font-family="'Cascadia Code', monospace" font-size="10" fill="#67e8f9">▸ ThreadPool</text>
  <text x="535" y="175" font-family="'Cascadia Code', monospace" font-size="10" fill="#67e8f9">▸ Commands</text>
  <text x="535" y="193" font-family="'Cascadia Code', monospace" font-size="10" fill="#67e8f9">▸ Auth</text>
  <text x="535" y="211" font-family="'Cascadia Code', monospace" font-size="10" fill="#67e8f9">▸ Handler</text>

  <!-- ===================== DATABASE BOX ===================== -->
  <rect x="700" y="80" width="175" height="150" rx="12" fill="url(#dbGrad)" stroke="#f59e0b" stroke-width="1.5" class="bp" style="animation-delay:2s"/>

  <text x="787" y="108" font-size="20" text-anchor="middle">🐘</text>
  <text x="787" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#fbbf24" text-anchor="middle" font-weight="700">PostgreSQL</text>
  <text x="787" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">JDBC / Repository</text>
  <line x1="725" y1="156" x2="850" y2="156" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>

  <text x="725" y="175" font-family="'Cascadia Code', monospace" font-size="10" fill="#fcd34d">▸ Users Table</text>
  <text x="725" y="193" font-family="'Cascadia Code', monospace" font-size="10" fill="#fcd34d">▸ HumanBeing</text>
  <text x="725" y="211" font-family="'Cascadia Code', monospace" font-size="10" fill="#fcd34d">▸ PreparedStmt</text>

  <!-- ===================== CONNECTIONS ===================== -->
  <!-- Client → Server -->
  <line x1="285" y1="140" x2="395" y2="140" stroke="url(#flowGrad1)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <line x1="285" y1="160" x2="395" y2="160" stroke="url(#flowGrad1)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <polygon points="389,135 399,140 389,145" fill="#06b6d4" opacity="0.8"/>
  <polygon points="291,155 285,160 291,165" fill="#7c3aed" opacity="0.8"/>

  <!-- Animated packets Client ↔ Server -->
  <circle r="4" cy="140" fill="#c084fc" filter="url(#glowA)" class="pr"/>
  <circle r="4" cy="160" fill="#22d3ee" filter="url(#glowA)" class="pl"/>

  <!-- Labels -->
  <rect x="315" y="125" width="60" height="14" rx="4" fill="#1e1b4b" opacity="0.8"/>
  <text x="345" y="135" font-family="'Cascadia Code', monospace" font-size="9" fill="#c084fc" text-anchor="middle">TCP/NIO</text>
  <rect x="312" y="163" width="66" height="14" rx="4" fill="#1e1b4b" opacity="0.8"/>
  <text x="345" y="173" font-family="'Cascadia Code', monospace" font-size="9" fill="#22d3ee" text-anchor="middle">Response</text>

  <!-- Server → DB -->
  <line x1="650" y1="140" x2="700" y2="140" stroke="url(#flowGrad2)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <line x1="650" y1="160" x2="700" y2="160" stroke="url(#flowGrad2)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <polygon points="694,135 704,140 694,145" fill="#f59e0b" opacity="0.8"/>
  <polygon points="656,155 650,160 656,165" fill="#06b6d4" opacity="0.8"/>

  <circle r="3" cy="140" fill="#22d3ee" filter="url(#glowA)" class="pr2"/>
  <circle r="3" cy="160" fill="#fbbf24" filter="url(#glowA)" class="pl2"/>

  <rect x="655" y="125" width="40" height="14" rx="4" fill="#0f172a" opacity="0.8"/>
  <text x="675" y="135" font-family="'Cascadia Code', monospace" font-size="9" fill="#fbbf24" text-anchor="middle">JDBC</text>

  <!-- ===================== DESIGN PATTERNS ===================== -->
  <line x1="50" y1="260" x2="850" y2="260" stroke="#7c3aed" stroke-width="0.5" opacity="0.15"/>
  <text x="450" y="285" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="4">DESIGN PATTERNS</text>

  <!-- DTO -->
  <rect x="30" y="305" width="155" height="55" rx="10" fill="#0d0221" stroke="#7c3aed" stroke-width="1" class="sg"/>
  <text x="107" y="328" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#c084fc" text-anchor="middle" font-weight="700">📦 DTO</text>
  <text x="107" y="348" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Request / Response</text>

  <!-- Command -->
  <rect x="200" y="305" width="155" height="55" rx="10" fill="#0d0221" stroke="#06b6d4" stroke-width="1" class="sg" style="animation-delay:0.8s"/>
  <text x="277" y="328" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="700">⚙️ Command</text>
  <text x="277" y="348" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Encapsulated Ops</text>

  <!-- Repository -->
  <rect x="370" y="305" width="155" height="55" rx="10" fill="#0d0221" stroke="#f59e0b" stroke-width="1" class="sg" style="animation-delay:1.6s"/>
  <text x="447" y="328" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="700">🗄️ Repository</text>
  <text x="447" y="348" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Database Isolation</text>

  <!-- EventBus -->
  <rect x="540" y="305" width="155" height="55" rx="10" fill="#0d0221" stroke="#f43f5e" stroke-width="1" class="sg" style="animation-delay:2.4s"/>
  <text x="617" y="328" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#fb7185" text-anchor="middle" font-weight="700">📡 EventBus</text>
  <text x="617" y="348" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Reactive Updates</text>

  <!-- Factory -->
  <rect x="710" y="305" width="155" height="55" rx="10" fill="#0d0221" stroke="#84cc16" stroke-width="1" class="sg" style="animation-delay:3.2s"/>
  <text x="787" y="328" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#a3e635" text-anchor="middle" font-weight="700">🏭 Factory</text>
  <text x="787" y="348" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Singleton Services</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="200" y="385" width="500" height="42" rx="10" fill="#0d0221" stroke="#312e81" stroke-width="0.5" opacity="0.6"/>

  <circle cx="240" cy="406" r="5" fill="#c084fc" filter="url(#glowA)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="254" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Request</text>

  <circle cx="330" cy="406" r="5" fill="#22d3ee" filter="url(#glowA)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <text x="344" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Response</text>

  <circle cx="430" cy="406" r="5" fill="#fbbf24" filter="url(#glowA)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <text x="444" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">DB Query</text>

  <line x1="520" y1="400" x2="555" y2="400" stroke="#64748b" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="565" y="404" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">Async Channel</text>
</svg>
